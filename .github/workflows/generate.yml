name: 下書き生成（毎週金曜）

on:
  schedule:
    - cron: "0 0 * * 5"  # 毎週金曜 09:00 JST
  workflow_dispatch:       # 手動実行も可能

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest code
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/yasunobut-bot/kokkai-market.git .
          echo "--- git log ---"
          git log --oneline -5
          echo "--- rakuten.py line 31 ---"
          sed -n '31p' src/rakuten.py
          echo "--- main.py line 1-5 ---"
          head -5 main.py

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python main.py generate
        env:
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: draft
          path: data/draft.json
